<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte - Relatar Problema</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<header>
    <h1>Central de Suporte</h1>
    <p>Relate um problema no sistema</p>
</header>

<!-- MENU -->
<nav>
    <a href="index.html">Dashboard</a>
    <a href="index.html#status">Status</a>
    <a href="index.html#predicao">Predição</a>
    <a href="index.html#sobre">Sobre</a>
    <a href="suporte.html">Meus Chamados</a>
</nav>


<!-- CONTEÚDO -->
<main class="container">

    <div class="form-card">

        <h2>Novo Chamado</h2>

        <form id="formProblema">

            <label>Nome</label>
            <input type="text" name="nome" placeholder="Seu nome" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="seu@email.com" required>

            <label>Tipo do Problema</label>
            <select name="tipo" required>
                <option value="">Selecione</option>
                <option>Temperatura</option>
                <option>Sensor</option>
                <option>Porta</option>
                <option>Sistema</option>
                <option>Outro</option>
            </select>

            <label>Descrição do Problema</label>
            <textarea name="descricao" rows="5" placeholder="Descreva o problema..." required></textarea>

            <button type="submit">Enviar Chamado</button>

        </form>

    </div>

</main>

<!-- RODAPÉ -->
<footer class="rodape">
    <p>Projeto Acadêmico - Cadeia Fria de Vacinas</p>
</footer>

<!-- IMPORTANDO JS -->
<script src="js/script.js"></script>

</body>
</html>
